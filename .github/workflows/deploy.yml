name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish Blazor app
        run: dotnet publish src/BlazorApp/SkiaSharpGames.BlazorApp.csproj --configuration Release --output dist

      - name: Set base href for GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: sed -i 's|<base href="/" />|<base href="/SkiaSharpGames/" />|g' dist/wwwroot/index.html

      - name: Copy index.html to 404.html for SPA routing
        if: github.ref == 'refs/heads/main'
        run: cp dist/wwwroot/index.html dist/wwwroot/404.html

      - name: Add .nojekyll
        if: github.ref == 'refs/heads/main'
        run: touch dist/wwwroot/.nojekyll

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/wwwroot

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main'
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
