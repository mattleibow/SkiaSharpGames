name: "Pages - Go Live"

on:
  # Auto-triggered when build/deploy or cleanup workflows finish.
  workflow_run:
    workflows:
      - "Pages - Staging - Build and Deploy"
      - "Pages - Staging - Cleanup"
    types:
      - completed
  # Allow manual re-deploy from the Actions tab
  workflow_dispatch:

# Default to no permissions — each job declares only what it needs.
permissions: {}

env:
  # Must match the PAGES_BRANCH in pages-staging-deploy.yml
  PAGES_BRANCH: gh-pages
  # Must match the STAGING_PATH in pages-staging-deploy.yml
  STAGING_PATH: staging
  # Full base URL for the site — derived from the repo owner and name
  SITE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

# Ensure go-live runs one at a time (latest wins)
concurrency:
  group: "pages-go-live"
  cancel-in-progress: true

jobs:
  deploy:
    # Only deploy on manual trigger, or when the upstream workflow succeeded
    # and came from this repository (not a fork).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      # Check out the pages branch containing the assembled site
      - name: Checkout pages branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PAGES_BRANCH }}

      # Remove .git so only site content is uploaded
      - name: Remove .git directory
        run: rm -rf .git

      # Configure GitHub Pages settings
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Package the site content as a Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploy the artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ══════════════════════════════════════════════════════════════════════════
  # PR COMMENT — Post staging preview link once GitHub Pages is actually live.
  # Runs only when triggered by a PR staging deploy (not a main deploy or
  # a cleanup), so the link is guaranteed to be reachable when clicked.
  # ══════════════════════════════════════════════════════════════════════════
  comment:
    name: Comment on PR
    needs: deploy
    runs-on: ubuntu-latest
    # Only comment when the upstream run was a PR staging deploy
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Pages - Staging - Build and Deploy' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null
    permissions:
      pull-requests: write
    steps:
      # Post (or update) the bot comment with the now-live staging URL.
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          STAGING_PATH: ${{ env.STAGING_PATH }}
          SITE_BASE_URL: ${{ env.SITE_BASE_URL }}
        with:
          script: |
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const stagingUrl = `${process.env.SITE_BASE_URL}/${process.env.STAGING_PATH}/${prNumber}/`;

            // Hidden marker to uniquely identify this workflow's comment
            const marker = '<!-- skiasharpgames-staging-preview -->';

            const commentBody = [
              marker,
              '🚀 **Staging Preview**',
              '',
              'This PR has been deployed to a staging environment:',
              '',
              `🔗 **[View Staging Site](${stagingUrl})**`,
              '',
              'This preview is updated automatically when you push new commits.',
              '',
              '---',
              '*Automatically posted by the site deployment workflow.*'
            ].join('\n');

            // Find and update existing bot comment, or create a new one
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });
            const botComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes(marker)
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }
