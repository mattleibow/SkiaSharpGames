<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to the
    // Blazor index.html which will pick up client-side routing.
    var pathSegmentsToKeep = 0;
    var repo = '/SkiaSharpGames';
    var fullPath = window.location.pathname;

    // Detect if this is a staging URL: /SkiaSharpGames/staging/{n}/...
    var stagingMatch = fullPath.match(new RegExp(repo + '/staging/(\\d+)'));
    if (stagingMatch) {
      // Redirect to the staging Blazor app root with the path encoded
      var prNum = stagingMatch[1];
      var basePath = repo + '/staging/' + prNum + '/';
      var routePath = fullPath.slice(basePath.length);
      sessionStorage.setItem('spa-redirect', routePath || '');
      window.location.replace(basePath);
    } else {
      // Root deployment
      var routePath = fullPath.slice((repo + '/').length);
      sessionStorage.setItem('spa-redirect', routePath || '');
      window.location.replace(repo + '/');
    }
  </script>
</head>
<body></body>
</html>
