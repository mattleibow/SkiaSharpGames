<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkiaSharp Games</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SkiaSharpGames.BlazorApp.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #0d1b2a;
            color: #e8f4f8;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            width: 100%;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Returns the bounding rect of a DOM element in CSS pixels.
        window.getElementRect = (el) => {
            const r = el.getBoundingClientRect();
            return { left: r.left, top: r.top, width: r.width, height: r.height };
        };

        // Focuses the first .game-view element on the page (called after a game page first renders).
        window.focusGameView = () => {
            document.querySelector('.game-view')?.focus();
        };
    </script>
</body>

</html>
