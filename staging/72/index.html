    <script>
        // GitHub Pages SPA redirect: pick up the route stored by 404.html
        (function () {
            var redirect = sessionStorage.getItem('spa-redirect');
            if (redirect) {
                sessionStorage.removeItem('spa-redirect');
                var base = document.querySelector('base').getAttribute('href');
                var newUrl = base + redirect;
                history.replaceState(null, '', newUrl);
            }
        })();
    </script>

        // Returns the bounding rect of a DOM element in CSS pixels.
        window.getElementRect = (el) => {
            const r = el.getBoundingClientRect();
            return { left: r.left, top: r.top, width: r.width, height: r.height };
        };
